name: Release Desktop App

# Builds the Tauri desktop shell for Windows, macOS (universal) and Linux,
# then attaches the installers to a GitHub Release. Cross-compiling these
# isn't realistic (each OS's installer format needs its own native
# toolchain), so this fans out across three runners instead of one.
#
# Triggered by pushing a tag like "app-v1.0.0" — kept separate from the
# "main" branch push that redeploys the website (deploy.yml), since a
# desktop release is a deliberate, versioned act, not something that
# should fire on every commit.

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'Ferheng Desktop v__VERSION__'
          releaseBody: 'Desktop installers for Windows, macOS and Linux. See the assets below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
